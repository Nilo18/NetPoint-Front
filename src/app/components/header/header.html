<header class="header" [class.scrolled]="scrolled()">
  <div class="header__inner">

    <!-- Logo -->
    <a class="header__logo" routerLink="/">
        
        <!-- Icon mark -->
        <div class="header__logo-icon">
            <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- N letterform -->
            <path d="M8 28 L8 8 L14.5 8 L22 22 L22 8 L28.5 8 L28.5 28 L22 28 L14.5 14 L14.5 28 Z"
                    fill="white"/>
            <!-- Accent dot — "the point" -->
            <circle cx="31.5" cy="27" r="3.5" fill="#5b50f0"/>
            </svg>
        </div>
        
        <!-- Wordmark -->
        <span class="header__logo-text">NetPoint</span>
    
    </a>

    <!-- Nav -->
    <nav class="header__nav">
      <a class="header__nav-link" routerLink="/product">Product</a>
      <a class="header__nav-link" routerLink="/security">Security</a>
      <a class="header__nav-link" routerLink="/privacy">Privacy</a>
    </nav>

    <!-- Actions -->
    <div class="header__actions">
      <a class="header__sign-in" routerLink="/login">Sign In</a>
      <a class="header__cta" routerLink="/signup">
        Get Started
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 12h14M13 6l6 6-6 6" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </div>

  </div>
</header>
